<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life</title>
    <style>
      canvas {
        outline: 1px dashed red;
      }
    </style>
  </head>
  <body>
    <canvas data-testid="canvas"></canvas>
    <script>
      const canvas = document.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      const cellSize = 20;
      const borderWidth = 2;
      const effectiveCellSize = cellSize + borderWidth;
      const x0 = canvas.clientWidth / 2 - effectiveCellSize / 2;
      const y0 = canvas.clientHeight / 2 - effectiveCellSize / 2;

      // background
      ctx.fillStyle = '#f00';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // cell border
      ctx.fillStyle = '#000';
      ctx.fillRect(x0, y0, effectiveCellSize, effectiveCellSize);

      // central cell
      ctx.fillStyle = '#fff';
      ctx.fillRect(
        x0 + borderWidth / 2,
        y0 + borderWidth / 2,
        cellSize,
        cellSize
      );
    </script>
  </body>
</html>
